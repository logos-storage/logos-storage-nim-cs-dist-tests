apiVersion: batch/v1
kind: Job
metadata:
  name: ${NAMEPREFIX}
  namespace: ${NAMESPACE}
  labels:
    name: ${NAMEPREFIX}
    runid: ${RUNID}
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 0
  template:
    metadata:
      name: ${NAMEPREFIX}
      labels:
        app: ${TEST_TYPE}-runner
        name: ${NAMEPREFIX}
        runid: ${RUNID}
    spec:
      priorityClassName: system-node-critical
      nodeSelector:
        workload-type: "tests-runners-ci"
      initContainers:
      # Extract openapi.yaml from the storage image under test into a shared volume.
      # The runner pod has no Docker daemon, so the StoragePlugin build consumes this
      # file instead of extracting it itself (see ProjectPlugins/LogosStorageClient).
      - name: fetch-openapi
        image: ${STORAGEDOCKERIMAGE}
        imagePullPolicy: Always
        command: ["cp", "/logosstorage/openapi.yaml", "/shared/openapi.yaml"]
        volumeMounts:
        - name: openapi
          mountPath: /shared
      containers:
      - name: runner
        image: logosstorage/logos-storage-dist-tests:latest
        imagePullPolicy: Always
        resources:
          requests:
            memory: "1Gi"
        env:
        - name: KUBECONFIG
          value: "/opt/kubeconfig.yaml"
        - name: LOGPATH
          value: "/var/log/storage-${TEST_TYPE}"
        - name: NAMESPACE
          value: "${NAMESPACE}"
        - name: BRANCH
          value: "${BRANCH}"
        - name: SOURCE
          value: "${SOURCE}"
        - name: RUNID
          value: "${RUNID}"
        - name: STORAGEDOCKERIMAGE
          value: "${STORAGEDOCKERIMAGE}"
        - name: TESTID
          value: "${TESTID}"
        - name: TESTS_TYPE
          value: "${TEST_TYPE}"
        volumeMounts:
        - name: kubeconfig
          mountPath: /opt/kubeconfig.yaml
          subPath: kubeconfig.yaml
        - name: logs
          mountPath: /var/log/storage-${TEST_TYPE}
        - name: openapi
          mountPath: /shared
        args: ${COMMAND}
      restartPolicy: Never
      volumes:
        - name: kubeconfig
          secret:
            secretName: storage-dist-tests-app-kubeconfig
        - name: logs
          hostPath:
            path: /var/log/storage-${TEST_TYPE}
        - name: openapi
          emptyDir: {}
